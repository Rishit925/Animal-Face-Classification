version: "3.9"

services:

  fastapi:
    build: .
    container_name: animal-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

  streamlit:
    build: .
    container_name: animal-streamlit
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

    ports:
      - "8501:8501"

    environment:
      API_URL: http://fastapi:8000/predict

    depends_on:
      - fastapi